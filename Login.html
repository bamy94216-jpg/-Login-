<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBGM 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #ddd;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        .input-group input::placeholder {
            color: #aaa;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ff4757, #ff6b6b);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
        .error-msg {
            color: #ff4757;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .success-page {
            display: none;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .success-page img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success-page .info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box" id="loginPage">
        <h2>PUBGM 账号登录</h2>
        <div class="input-group">
            <label>账号</label>
            <input type="text" id="account" placeholder="请输入账号">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="login-btn" onclick="login()">登录</button>
        <div class="error-msg" id="errorMsg">账号或密码错误，请重试</div>
    </div>

    <div class="success-page" id="successPage">
        <h2>登录成功 ✅</h2>
        <img src="https://picsum.photos/id/237/800/500" alt="PUBGM 游戏界面">
        <div class="info">
            <p><strong>账号：</strong><span id="showAccount"></span></p>
            <p><strong>密码：</strong><span id="showPassword"></span></p>
        </div>
    </div>

    <script>
        let accounts = [];

        // 从你的 GitHub 仓库拉取账号列表
        async function loadAccounts() {
            try {
                const response = await fetch('https://bamy94216-jpg.github.io/-Login-/accounts.json');
                accounts = await response.json();
            } catch (error) {
                console.error('加载账号列表失败', error);
            }
        }

        // 登录校验
        async function login() {
            if (accounts.length === 0) {
                await loadAccounts();
            }

            const account = document.getElementById('account').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginPage = document.getElementById('loginPage');
            const successPage = document.getElementById('successPage');

            const matchedAccount = accounts.find(
                item => item.account === account && item.password === password
            );

            if (matchedAccount) {
                loginPage.style.display = 'none';
                successPage.style.display = 'block';
                errorMsg.style.display = 'none';
                document.getElementById('showAccount').textContent = matchedAccount.account;
                document.getElementById('showPassword').textContent = matchedAccount.password;
            } else {
                errorMsg.style.display = 'block';
            }
        }

        window.onload = loadAccounts;
    </script>
</body>
</html>
